<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAIXA Loterias | Login Simulado</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script src="assets/js/dataStore.js?v=ECOSSISTEMA-2025-001" defer></script>
  <script src="assets/js/auth.js?v=ECOSSISTEMA-2025-001" defer></script>
  <script src="assets/js/calculations.js?v=ECOSSISTEMA-2025-001" defer></script>
  <script src="assets/js/app.js?v=ECOSSISTEMA-2025-001" defer></script>
</head>
<body data-page="login">
  <main class="login-shell">
    <section class="login-panel" aria-labelledby="login-title">
      <div class="brand-block">
        <span class="brand-mark">CL</span>
        <div>
          <p class="eyebrow">CAIXA Loterias</p>
          <h1 id="login-title">Indicadores Estratégicos</h1>
        </div>
      </div>

      <form id="loginForm" class="form-grid">
        <label>
          Usuário
          <select id="usuarioSelect" name="usuario" required>
            <option value="">Carregando usuários...</option>
          </select>
        </label>

        <label>
          Perfil
          <input id="perfilInput" type="text" readonly>
        </label>

        <label>
          Unidade apuradora
          <input id="unidadeInput" type="text" readonly>
        </label>

        <label>
          Diretoria responsável
          <input id="diretoriaInput" type="text" readonly>
        </label>

        <button class="primary-action" type="submit">Entrar</button>
      </form>
    </section>
  </main>
</body>
</html>
