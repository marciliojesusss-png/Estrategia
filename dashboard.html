<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CAIXA Loterias | Dashboard</title>
  <link rel="stylesheet" href="assets/css/styles.css?v=PERSISTENCIA-CENTRAL-002">
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
  <script src="assets/js/currency.js?v=PERSISTENCIA-CENTRAL-002" defer></script>
  <script src="assets/js/dataStore.js?v=PERSISTENCIA-CENTRAL-002" defer></script>
  <script src="assets/js/auth.js?v=PERSISTENCIA-CENTRAL-002" defer></script>
  <script src="assets/js/calculations.js?v=PERSISTENCIA-CENTRAL-002" defer></script>
  <script src="assets/js/formulas.js?v=PERSISTENCIA-CENTRAL-002" defer></script>
  <script src="assets/js/dashboard.js?v=PERSISTENCIA-CENTRAL-002" defer></script>
  <script src="assets/js/app.js?v=PERSISTENCIA-CENTRAL-002" defer></script>
</head>
<body data-page="dashboard">
  <div class="app-shell">
    <header id="appHeader" class="topbar"></header>
    <nav id="appNav" class="sidebar"></nav>
    <main class="content">
      <section class="page-heading">
        <p class="eyebrow">Visão geral</p>
        <h1>Dashboard</h1>
      </section>

      <section class="filters" aria-label="Filtros do dashboard">
        <label>Ano <select data-filter="ano"></select></label>
        <label>Competência <select data-filter="mes"></select></label>
        <label>Plano <select data-filter="plano"></select></label>
        <label>Pilar <select data-filter="pilar"></select></label>
        <label>Unidade apuradora <select data-filter="unidade"></select></label>
        <label>Diretoria responsável <select data-filter="diretoria"></select></label>
        <label>Status <select data-filter="status"></select></label>
      </section>

      <section id="summaryCards" class="summary-grid" aria-label="Resumo dos indicadores"></section>

      <section class="chart-grid">
        <article class="panel">
          <h2>Indicadores por plano</h2>
          <canvas id="chartPlano" height="220"></canvas>
        </article>
        <article class="panel">
          <h2>Indicadores por pilar</h2>
          <canvas id="chartPilar" height="220"></canvas>
        </article>
        <article class="panel">
          <h2>Atingimento oficial por pilar</h2>
          <canvas id="chartDesempenhoPilar" height="220"></canvas>
        </article>
        <article class="panel">
          <h2>Evolução do atingimento oficial</h2>
          <canvas id="chartEvolucao" height="220"></canvas>
        </article>
        <article class="panel">
          <h2>Status dos lançamentos</h2>
          <canvas id="chartStatus" height="220"></canvas>
        </article>
        <article class="panel">
          <h2>Situação de desempenho</h2>
          <canvas id="chartDesempenhoStatus" height="220"></canvas>
        </article>
      </section>

      <section class="strategic-performance-section" aria-labelledby="strategicPerformanceTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Estrutura gerencial</p>
            <h2 id="strategicPerformanceTitle">Desempenho dos Indicadores Estratégicos</h2>
          </div>
          <p>Organização por Plano &gt; Pilar &gt; Indicador.</p>
        </div>
        <div id="strategicPerformance"></div>
      </section>
    </main>
  </div>
</body>
</html>
